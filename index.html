<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empires of the Indian Subcontinent</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0c09;
    --surface:  #17140e;
    --border:   #3a3020;
    --gold:     #c9a84c;
    --gold-dim: #7a6128;
    --text:     #e8dfc8;
    --muted:    #8a7d60;
    --panel-w:  320px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'EB Garamond', Georgia, serif; overflow: hidden; }

  #shell { display: flex; height: 100vh; width: 100vw; }
  #panel { width: var(--panel-w); min-width: var(--panel-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  #panel-header { padding: 24px 22px 16px; border-bottom: 1px solid var(--border); }
  #panel-header h1 { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; }
  #panel-header p { font-size: 12px; color: var(--muted); font-style: italic; }

  #year-block { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); }
  #year-big { font-family: 'Cinzel', serif; font-size: 34px; font-weight: 400; color: var(--text); line-height: 1; letter-spacing: 0.04em; }
  #era-name { font-size: 11px; color: var(--gold-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 5px; }

  #slider-block { padding: 14px 22px 16px; border-bottom: 1px solid var(--border); }
  #timeline { -webkit-appearance: none; appearance: none; width: 100%; height: 2px; background: var(--border); outline: none; cursor: pointer; }
  #timeline::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--gold-dim); }
  #timeline::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid var(--bg); }
  #tick-labels { display: flex; justify-content: space-between; margin-top: 7px; }
  #tick-labels span { font-size: 10px; color: var(--muted); font-family: 'Cinzel', serif; }

  #controls { display: flex; gap: 8px; padding: 10px 22px 14px; border-bottom: 1px solid var(--border); align-items: center; }
  .ctrl-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'EB Garamond', serif; font-size: 13px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .ctrl-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .ctrl-btn.active { background: var(--gold-dim); border-color: var(--gold-dim); color: var(--text); }
  #speed-label { margin-left: auto; font-size: 11px; color: var(--muted); }
  #speed-select { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 11px; cursor: pointer; }

  #empire-scroll { flex: 1; overflow-y: auto; padding: 12px 0; }
  #empire-scroll::-webkit-scrollbar { width: 3px; }
  #empire-scroll::-webkit-scrollbar-thumb { background: var(--border); }

  .section-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 22px 7px; font-family: 'Cinzel', serif; }
  .empire-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 22px; cursor: pointer; transition: background 0.12s; border-left: 3px solid transparent; }
  .empire-item:hover { background: rgba(201,168,76,0.05); }
  .empire-item.active { background: rgba(201,168,76,0.08); border-left-color: var(--gold-dim); }
  .empire-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .empire-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .empire-dates { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 1px; }
  #no-empires { padding: 14px 22px; font-size: 13px; color: var(--muted); font-style: italic; display: none; }

  #loading { position: absolute; inset: 0; background: rgba(14,12,9,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 14px; }
  #loading p { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); letter-spacing: 0.1em; }
  #loading-bar-wrap { width: 180px; height: 2px; background: var(--border); }
  #loading-bar { height: 100%; width: 0%; background: var(--gold); transition: width 0.3s; }

  #info-card { position: absolute; bottom: 24px; right: 20px; width: 290px; background: rgba(14,12,9,0.93); border: 1px solid var(--border); padding: 16px 18px; z-index: 500; backdrop-filter: blur(8px); display: none; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  #info-card h2 { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); margin-bottom: 5px; font-weight: 400; letter-spacing: 0.06em; }
  #info-card .dates { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 9px; }
  #info-card p { font-size: 13px; line-height: 1.65; color: var(--text); }
  #info-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
  #info-close:hover { color: var(--text); }

  .leaflet-control-attribution { background: rgba(14,12,9,0.7) !important; color: #5a5040 !important; font-size: 10px !important; }
  .leaflet-control-attribution a { color: #7a6840 !important; }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--muted) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { color: var(--gold) !important; }

  @media (max-width: 640px) {
    #panel { position: absolute; bottom: 0; left: 0; right: 0; width: 100%; height: 50%; border-right: none; border-top: 1px solid var(--border); z-index: 20; }
    #map-wrap { height: 50%; }
    #shell { flex-direction: column; }
    #info-card { right: 8px; bottom: 52%; width: calc(100% - 16px); }
  }
</style>
</head>
<body>

<div id="shell">
  <div id="panel">
    <div id="panel-header">
      <h1>Empires of India</h1>
      <p>600 BCE – 1947 CE</p>
    </div>
    <div id="year-block">
      <div id="year-big">300 BCE</div>
      <div id="era-name">Early Classical Period</div>
    </div>
    <div id="slider-block">
      <input type="range" id="timeline" min="-600" max="1947" value="-300" step="5">
      <div id="tick-labels">
        <span>600 BCE</span><span>1 CE</span><span>600</span><span>1200</span><span>1947</span>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
      <span id="speed-label">Speed:
        <select id="speed-select">
          <option value="150">Slow</option>
          <option value="70" selected>Normal</option>
          <option value="25">Fast</option>
        </select>
      </span>
    </div>
    <div id="empire-scroll">
      <div class="section-label">Active Polities</div>
      <div id="no-empires">No recorded major empire this period.</div>
      <div id="empire-list"></div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="loading">
      <p>Loading geographic data…</p>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>
    <div id="info-card">
      <button id="info-close">×</button>
      <h2 id="ic-name"></h2>
      <div class="dates" id="ic-dates"></div>
      <p id="ic-desc"></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

const EMPIRES = [
  {
    id: "mahajanapadas", name: "Mahajanapadas", start: -600, end: -345, color: "#a78bfa",
    regions: ["IND","NPL","BGD"],
    desc: "The sixteen great kingdoms of the Vedic period, concentrated in the Gangetic plain. These rival states — Magadha, Kosala, Vatsa, Avanti, and others — formed the political crucible from which pan-Indian empires emerged."
  },
  {
    id: "nanda", name: "Nanda Empire", start: -345, end: -322, color: "#818cf8",
    regions: ["IND","NPL","BGD","PAK"],
    desc: "The first dynasty to consolidate the Gangetic plain under one authority. So formidable that Alexander the Great's army refused to cross the Beas River rather than face them. Overthrown by Chandragupta Maurya in 322 BCE."
  },
  {
    id: "maurya", name: "Maurya Empire", start: -322, end: -185, color: "#6366f1",
    regions: ["IND","PAK","AFG","NPL","BGD","LKA"],
    desc: "Founded by Chandragupta Maurya; under Ashoka (268–232 BCE) it encompassed nearly the entire subcontinent plus parts of Afghanistan. Ashoka's conversion to Buddhism after the Kalinga War transformed the empire's character and spread the dharma across Asia."
  },
  {
    id: "satavahana", name: "Satavahana Kingdom", start: -230, end: 220, color: "#f97316",
    regions: ["IND"],
    desc: "Dominant power of the Deccan for over four centuries. A cultural and commercial bridge between north and south India, patronising Prakrit literature and Buddhist monuments including the stupa at Amaravati."
  },
  {
    id: "kushan", name: "Kushan Empire", start: 30, end: 375, color: "#f59e0b",
    regions: ["AFG","PAK","TJK","TKM","UZB"],
    desc: "A Central Asian dynasty controlling Bactria, Afghanistan, and the northwest subcontinent. Custodians of a key Silk Road segment. Gandharan art — a fusion of Hellenistic and Indian styles — flourished under their patronage."
  },
  {
    id: "gupta", name: "Gupta Empire", start: 320, end: 550, color: "#34d399",
    regions: ["IND","NPL","BGD","PAK"],
    desc: "India's Classical Golden Age. The Gupta period produced Aryabhata (mathematics, astronomy), Kalidasa (literature), and saw the consolidation of the concept of zero. Covers most of northern and central India at its peak."
  },
  {
    id: "vakatakas", name: "Vakataka Dynasty", start: 250, end: 500, color: "#fb923c",
    regions: ["IND"],
    desc: "Contemporaries and allies of the Guptas, ruling central India. Remembered chiefly for patronising the Ajanta Caves, whose Buddhist frescoes are among the finest examples of ancient painting in the world."
  },
  {
    id: "pallava", name: "Pallava Dynasty", start: 275, end: 897, color: "#e879f9",
    regions: ["IND","LKA"],
    desc: "Dominant power of the Tamil south for much of the first millennium, ruling from Kanchipuram. The Shore Temple at Mahabalipuram is their most celebrated legacy. Their influence extended to Southeast Asia via maritime trade."
  },
  {
    id: "harsha", name: "Harsha's Empire", start: 606, end: 647, color: "#2dd4bf",
    regions: ["IND","NPL","BGD","PAK"],
    desc: "The last great Hindu emperor of northern India. His court attracted the Chinese pilgrim Xuanzang, whose memoir is a primary source for the period. After his death without an heir, northern India fragmented into smaller kingdoms."
  },
  {
    id: "chalukya_badami", name: "Chalukya of Badami", start: 543, end: 757, color: "#f472b6",
    regions: ["IND"],
    desc: "The first dynasty to truly unite the Deccan into a major power. Checked the Pallavas in the south and resisted Harsha in the north. Their cave temples at Badami and Pattadakal mark a pivotal moment in Indian temple architecture."
  },
  {
    id: "rashtrakuta", name: "Rashtrakuta Dynasty", start: 753, end: 982, color: "#60a5fa",
    regions: ["IND"],
    desc: "Rose from Chalukya subordinates to become the paramount Deccan power. At their peak they campaigned deep into northern India and received embassies from the Abbasid Caliphate. The Kailasa Temple at Ellora — carved from a single rock — is their masterwork."
  },
  {
    id: "pala", name: "Pala Empire", start: 750, end: 1161, color: "#a3e635",
    regions: ["BGD","IND"],
    desc: "The last major Buddhist dynasty of India, ruling Bengal and Bihar for four centuries. They founded Vikramashila and Odantapuri universities, attracting scholars from Tibet, China, and Southeast Asia. Their bronze sculptures are among the finest in Buddhist art."
  },
  {
    id: "pratihara", name: "Gurjara-Pratihara", start: 730, end: 1036, color: "#fbbf24",
    regions: ["IND","PAK"],
    desc: "The dominant power of northern India for over two centuries, repeatedly repelling Arab incursions from Sindh. Their eventual decline opened northern India to Turkic invasions from the northwest."
  },
  {
    id: "chola", name: "Chola Empire", start: 848, end: 1279, color: "#f87171",
    regions: ["IND","LKA","MDV"],
    desc: "Among the greatest maritime powers of the pre-modern world. In 1025 CE they launched a naval expedition that sacked Srivijaya in Sumatra. The Brihadeeswarar Temple at Thanjavur is one of the great monuments of world architecture."
  },
  {
    id: "ghaznavid", name: "Ghaznavid Sultanate", start: 977, end: 1186, color: "#94a3b8",
    regions: ["AFG","PAK","TJK","TKM"],
    desc: "Mahmud of Ghazni conducted seventeen raids into the subcontinent, most famously sacking the temple of Somnath in 1025 CE. The Ghaznavids established the first sustained Turkic Muslim presence in the Punjab."
  },
  {
    id: "delhi_sultanate", name: "Delhi Sultanate", start: 1206, end: 1526, color: "#86efac",
    regions: ["IND","PAK","BGD","NPL"],
    desc: "Five successive Turkic and Afghan dynasties ruling from Delhi for over three centuries. At its greatest extent under Alauddin Khilji it reached the far south. The Sultanate's armies repelled the Mongol invasions that devastated much of the rest of Eurasia."
  },
  {
    id: "vijayanagara", name: "Vijayanagara Empire", start: 1336, end: 1646, color: "#fca5a5",
    regions: ["IND","LKA"],
    desc: "The last great Hindu empire of south India, whose capital was one of the largest cities in the world in the 15th century. The catastrophic defeat at Talikota (1565) shattered the empire, though successor kingdoms persisted into the 17th century."
  },
  {
    id: "bahmani", name: "Bahmani Sultanate", start: 1347, end: 1527, color: "#7dd3fc",
    regions: ["IND"],
    desc: "The first independent Muslim kingdom of the Deccan and constant rival of Vijayanagara. It fragmented into five successor Deccan Sultanates — Bijapur, Golconda, Ahmadnagar, Bidar, and Berar — whose combined forces defeated Vijayanagara at Talikota."
  },
  {
    id: "mughal", name: "Mughal Empire", start: 1526, end: 1707, color: "#c084fc",
    regions: ["IND","PAK","AFG","BGD","NPL"],
    desc: "Founded by Babur after Panipat (1526), the Mughal Empire became one of the largest empires in world history. Under Akbar it developed sophisticated administration and religious pluralism. Shah Jahan built the Taj Mahal. Under Aurangzeb it reached its greatest territorial extent."
  },
  {
    id: "maratha", name: "Maratha Confederacy", start: 1674, end: 1818, color: "#fb923c",
    regions: ["IND","PAK","BGD","NPL"],
    desc: "Founded by Chhatrapati Shivaji Maharaj, the Maratha state grew from guerrilla resistance into a vast confederacy. By the mid-18th century the Marathas were the pre-eminent power in India. Three Anglo-Maratha Wars ultimately resulted in British annexation."
  },
  {
    id: "sikh", name: "Sikh Empire", start: 1799, end: 1849, color: "#fde68a",
    regions: ["PAK","AFG"],
    desc: "Founded by Maharaja Ranjit Singh, the Sikh Empire controlled the Punjab, Kashmir, and the North-West Frontier with a modernised army trained by European officers. Dissolved following two Anglo-Sikh Wars."
  },
  {
    id: "eic", name: "East India Company", start: 1757, end: 1858, color: "#cbd5e1",
    regions: ["IND","PAK","BGD","LKA","MMR"],
    desc: "Following Plassey (1757), the East India Company transitioned from trading enterprise to territorial power. Through military conquest, subsidiary alliances, and the doctrine of lapse, it absorbed most of the subcontinent over a century."
  },
  {
    id: "british_raj", name: "British Raj", start: 1858, end: 1947, color: "#e2e8f0",
    regions: ["IND","PAK","BGD","NPL","LKA","MMR"],
    desc: "After the 1857 uprising, the Crown assumed direct sovereignty over India. The Raj controlled the subcontinent through directly administered provinces and nominally independent princely states. It ended with Partition and independence on 14–15 August 1947."
  }
];

// iso numeric (as string, zero-padded) -> iso alpha-3
// Natural Earth uses numeric codes
const ISO_NUM_TO_A3 = {
  "004":"AFG","050":"BGD","064":"BTN","356":"IND","462":"MDV",
  "104":"MMR","524":"NPL","586":"PAK","144":"LKA","762":"TJK",
  "795":"TKM","860":"UZB","398":"KAZ","417":"KGZ","364":"IRN",
  "760":"SYR","400":"JOR","356":"IND"
};

function getEra(y) {
  if (y < -500) return "Vedic Period";
  if (y < -300) return "Late Vedic / Mahajanapadas";
  if (y < 0)    return "Early Classical Period";
  if (y < 320)  return "Post-Mauryan Period";
  if (y < 550)  return "Classical / Gupta Period";
  if (y < 750)  return "Early Medieval Period";
  if (y < 1000) return "Tripartite Struggle Era";
  if (y < 1200) return "Rajput & Chola Period";
  if (y < 1400) return "Delhi Sultanate Period";
  if (y < 1526) return "Late Sultanate Period";
  if (y < 1700) return "Mughal Period";
  if (y < 1800) return "Mughal Decline / Maratha Ascent";
  if (y < 1858) return "Company Rule";
  return "British Raj";
}

function fmtYear(y) { return y < 0 ? Math.abs(y) + " BCE" : y + " CE"; }

// ── MAP ──────────────────────────────────────────────────────────────
const map = L.map('map', { center: [22, 80], zoom: 4, zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd', maxZoom: 10, minZoom: 2
}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 10, minZoom: 2, pane: 'shadowPane'
}).addTo(map);

// ── GEOJSON LOADING ──────────────────────────────────────────────────
const countryLayers = {};  // a3 -> L.GeoJSON
let activeSet = new Set();

function setBar(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
}

async function loadDeps() {
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function boot() {
  setBar(10);
  await loadDeps();
  setBar(35);

  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const topo = await res.json();
  setBar(65);

  const geojson = topojson.feature(topo, topo.objects.countries);
  setBar(82);

  geojson.features.forEach(feature => {
    const numId = String(feature.id).padStart(3, '0');
    const a3 = ISO_NUM_TO_A3[numId];
    if (!a3) return;

    const layer = L.geoJSON(feature, {
      style: { fillColor: '#fff', fillOpacity: 0, color: 'transparent', weight: 0 }
    });

    layer.on('click', () => {
      const year = parseInt(document.getElementById('timeline').value);
      const matches = EMPIRES.filter(e => year >= e.start && year <= e.end && e.regions.includes(a3));
      if (matches.length) showInfo(matches[matches.length - 1]);
    });

    layer.on('mouseover', function() {
      if (activeSet.has(a3)) this.setStyle({ fillOpacity: 0.65, weight: 2 });
    });
    layer.on('mouseout', function() {
      if (activeSet.has(a3)) this.setStyle({ fillOpacity: 0.45, weight: 1 });
    });

    countryLayers[a3] = layer;
    layer.addTo(map);
  });

  setBar(100);
  setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 350);
  update(parseInt(document.getElementById('timeline').value));
}

// ── UPDATE ───────────────────────────────────────────────────────────
function update(year) {
  document.getElementById('year-big').textContent = fmtYear(year);
  document.getElementById('era-name').textContent = getEra(year);

  const active = EMPIRES.filter(e => year >= e.start && year <= e.end);

  // Build country → empire list
  const countryMap = {};
  active.forEach(empire => {
    empire.regions.forEach(iso => {
      if (!countryMap[iso]) countryMap[iso] = [];
      countryMap[iso].push(empire);
    });
  });

  activeSet = new Set(Object.keys(countryMap));

  Object.keys(countryLayers).forEach(iso => {
    const layer = countryLayers[iso];
    if (countryMap[iso]) {
      // Use the most recently founded empire's color for this country
      const emp = countryMap[iso][countryMap[iso].length - 1];
      layer.setStyle({ fillColor: emp.color, fillOpacity: 0.45, color: emp.color, weight: 1, opacity: 0.7 });
    } else {
      layer.setStyle({ fillColor: '#fff', fillOpacity: 0, color: 'transparent', weight: 0 });
    }
  });

  // Sidebar
  const listEl = document.getElementById('empire-list');
  const noEl = document.getElementById('no-empires');
  listEl.innerHTML = '';
  if (active.length === 0) {
    noEl.style.display = 'block';
  } else {
    noEl.style.display = 'none';
    active.forEach(e => {
      const el = document.createElement('div');
      el.className = 'empire-item active';
      el.innerHTML = `<div class="empire-dot" style="background:${e.color}"></div>
        <div><div class="empire-name">${e.name}</div>
        <div class="empire-dates">${fmtYear(e.start)} – ${fmtYear(e.end)}</div></div>`;
      el.addEventListener('click', () => showInfo(e));
      listEl.appendChild(el);
    });
  }

  // Slider fill
  const sl = document.getElementById('timeline');
  const pct = Math.round(((year - parseInt(sl.min)) / (parseInt(sl.max) - parseInt(sl.min))) * 100);
  sl.style.background = `linear-gradient(to right, #c9a84c ${pct}%, #3a3020 ${pct}%)`;
}

// ── INFO CARD ────────────────────────────────────────────────────────
function showInfo(e) {
  document.getElementById('ic-name').textContent = e.name;
  document.getElementById('ic-dates').textContent = fmtYear(e.start) + ' – ' + fmtYear(e.end);
  document.getElementById('ic-desc').textContent = e.desc;
  document.getElementById('info-card').style.display = 'block';
}
document.getElementById('info-close').addEventListener('click', () => {
  document.getElementById('info-card').style.display = 'none';
});

// ── CONTROLS ─────────────────────────────────────────────────────────
const slider = document.getElementById('timeline');
slider.addEventListener('input', e => update(parseInt(e.target.value)));

let playing = false, timer = null;
const btnPlay = document.getElementById('btn-play');

function getSpeed() { return parseInt(document.getElementById('speed-select').value); }

function startPlay() {
  playing = true;
  btnPlay.textContent = '◼ Stop';
  btnPlay.classList.add('active');
  let val = parseInt(slider.value);
  if (val >= 1947) val = -600;
  timer = setInterval(() => {
    val += 5;
    if (val > 1947) { stopPlay(); return; }
    slider.value = val;
    update(val);
  }, getSpeed());
}

function stopPlay() {
  playing = false;
  clearInterval(timer);
  btnPlay.textContent = '▶ Play';
  btnPlay.classList.remove('active');
}

btnPlay.addEventListener('click', () => playing ? stopPlay() : startPlay());

document.getElementById('btn-reset').addEventListener('click', () => {
  stopPlay(); slider.value = -600; update(-600);
});

document.getElementById('speed-select').addEventListener('change', () => {
  if (playing) { stopPlay(); startPlay(); }
});

// ── BOOT ─────────────────────────────────────────────────────────────
boot().catch(err => {
  document.getElementById('loading').innerHTML =
    '<p style="color:#f87171;font-family:Cinzel,serif;font-size:13px;letter-spacing:0.1em">Failed to load map data. Check your connection.</p>';
  console.error(err);
});
</script>
</body>
</html>
