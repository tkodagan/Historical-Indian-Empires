<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empires of the Indian Subcontinent</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0c09;
    --surface:   #17140e;
    --border:    #3a3020;
    --gold:      #c9a84c;
    --gold-dim:  #7a6128;
    --text:      #e8dfc8;
    --text-muted:#8a7d60;
    --panel-w:   340px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden;
  }

  /* ─── Layout ─── */
  #shell {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  #panel {
    width: var(--panel-w);
    min-width: var(--panel-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  #map-wrap {
    flex: 1;
    position: relative;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* ─── Panel Header ─── */
  #panel-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  #panel-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  #panel-header p {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ─── Year Display ─── */
  #year-block {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  #year-big {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
    letter-spacing: 0.04em;
  }

  #era-name {
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ─── Slider ─── */
  #slider-block {
    padding: 16px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  #timeline {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
    position: relative;
  }

  #timeline::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--gold-dim);
  }

  #timeline::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  #tick-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  #tick-labels span {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
  }

  /* ─── Play Controls ─── */
  #controls {
    display: flex;
    gap: 8px;
    padding: 12px 24px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }

  .ctrl-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .ctrl-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold-dim);
    color: var(--text);
  }

  #speed-label {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ─── Empire List ─── */
  #empire-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
  }

  #empire-scroll::-webkit-scrollbar { width: 4px; }
  #empire-scroll::-webkit-scrollbar-track { background: transparent; }
  #empire-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 24px 8px;
    font-family: 'Cinzel', serif;
  }

  .empire-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 24px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }

  .empire-item:hover {
    background: rgba(201,168,76,0.05);
  }

  .empire-item.active {
    background: rgba(201,168,76,0.08);
    border-left-color: var(--gold-dim);
  }

  .empire-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .empire-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .empire-dates {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 1px;
  }

  .empire-item.inactive .empire-name { color: var(--text-muted); }
  .empire-item.inactive .empire-dot { opacity: 0.3; }

  /* ─── Info Panel overlay ─── */
  #info-card {
    position: absolute;
    bottom: 28px;
    right: 24px;
    width: 300px;
    background: rgba(14,12,9,0.92);
    border: 1px solid var(--border);
    padding: 18px 20px;
    z-index: 500;
    backdrop-filter: blur(8px);
    display: none;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #info-card h2 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 400;
    letter-spacing: 0.06em;
  }

  #info-card .dates {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 10px;
  }

  #info-card p {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
  }

  #info-close {
    position: absolute;
    top: 10px; right: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }

  #info-close:hover { color: var(--text); }

  /* ─── Map attribution override ─── */
  .leaflet-control-attribution {
    background: rgba(14,12,9,0.7) !important;
    color: #5a5040 !important;
    font-size: 10px !important;
  }

  .leaflet-control-attribution a { color: #7a6840 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text-muted) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--border) !important;
    color: var(--gold) !important;
  }

  /* ─── Empty state ─── */
  #no-empires {
    padding: 16px 24px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    display: none;
  }

  /* ─── Mobile tweaks ─── */
  @media (max-width: 640px) {
    #panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 52%;
      border-right: none;
      border-top: 1px solid var(--border);
      z-index: 20;
    }
    #map-wrap { height: 48%; }
    #shell { flex-direction: column; }
    #info-card { right: 8px; bottom: 54%; width: calc(100% - 16px); }
  }
</style>
</head>
<body>

<div id="shell">
  <div id="panel">
    <div id="panel-header">
      <h1>Empires of India</h1>
      <p>600 BCE – 1947 CE</p>
    </div>

    <div id="year-block">
      <div id="year-big">300 BCE</div>
      <div id="era-name">Early Classical Period</div>
    </div>

    <div id="slider-block">
      <input type="range" id="timeline" min="-600" max="1947" value="-300" step="5">
      <div id="tick-labels">
        <span>600 BCE</span>
        <span>1 CE</span>
        <span>600</span>
        <span>1200</span>
        <span>1947</span>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
      <span id="speed-label">
        Speed:
        <select id="speed-select" style="background:transparent;border:none;color:var(--text-muted);font-family:inherit;font-size:11px;cursor:pointer;">
          <option value="120">Slow</option>
          <option value="60" selected>Normal</option>
          <option value="25">Fast</option>
        </select>
      </span>
    </div>

    <div id="empire-list-section">
      <div class="section-label">Active Polities</div>
      <div id="no-empires">No recorded major empire this period.</div>
      <div id="empire-list"></div>
    </div>

    <div id="empire-scroll" style="display:none"></div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="info-card">
      <button id="info-close">×</button>
      <h2 id="ic-name"></h2>
      <div class="dates" id="ic-dates"></div>
      <p id="ic-desc"></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ─────────────────────────────────────────────
// ERA LABELS
// ─────────────────────────────────────────────
function getEra(year) {
  if (year < -500) return "Vedic Period";
  if (year < -300) return "Late Vedic / Mahajanapadas";
  if (year < 0)    return "Early Classical Period";
  if (year < 320)  return "Post-Mauryan Period";
  if (year < 550)  return "Classical / Gupta Period";
  if (year < 750)  return "Early Medieval Period";
  if (year < 1000) return "Tripartite Struggle Era";
  if (year < 1200) return "Rajput & Chola Period";
  if (year < 1400) return "Delhi Sultanate Period";
  if (year < 1526) return "Late Sultanate Period";
  if (year < 1600) return "Early Mughal Period";
  if (year < 1700) return "High Mughal Period";
  if (year < 1800) return "Mughal Decline / Maratha Ascent";
  if (year < 1858) return "Company Rule";
  if (year < 1947) return "British Raj";
  return "Independence";
}

function formatYear(y) {
  return y < 0 ? Math.abs(y) + " BCE" : y + " CE";
}

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
const map = L.map('map', {
  center: [22, 78],
  zoom: 4,
  zoomControl: true,
  attributionControl: true
});

// Dark map tiles — CartoDB Dark Matter
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 10,
  minZoom: 3
}).addTo(map);

// Label layer on top
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 10,
  minZoom: 3,
  pane: 'shadowPane'
}).addTo(map);

// ─────────────────────────────────────────────
// BUILD LEAFLET LAYERS
// ─────────────────────────────────────────────
const layers = {};

EMPIRES.forEach(empire => {
  const layer = L.geoJSON(empire.territory, {
    style: {
      fillColor: empire.color,
      fillOpacity: 0.38,
      color: empire.color,
      weight: 1.5,
      opacity: 0.7
    }
  });

  layer.on('click', () => showInfoCard(empire));
  layer.on('mouseover', function() {
    this.setStyle({ fillOpacity: 0.55, weight: 2.5 });
  });
  layer.on('mouseout', function() {
    this.setStyle({ fillOpacity: 0.38, weight: 1.5 });
  });

  layers[empire.id] = layer;
});

// ─────────────────────────────────────────────
// INFO CARD
// ─────────────────────────────────────────────
function showInfoCard(empire) {
  document.getElementById('ic-name').textContent = empire.name;
  document.getElementById('ic-dates').textContent =
    formatYear(empire.start) + ' – ' + formatYear(empire.end);
  document.getElementById('ic-desc').textContent = empire.desc;
  document.getElementById('info-card').style.display = 'block';
}

document.getElementById('info-close').addEventListener('click', () => {
  document.getElementById('info-card').style.display = 'none';
});

// ─────────────────────────────────────────────
// UPDATE FUNCTION
// ─────────────────────────────────────────────
function update(year) {
  const active = [];
  const inactive = [];

  EMPIRES.forEach(empire => {
    const isActive = year >= empire.start && year <= empire.end;
    const layer = layers[empire.id];

    if (isActive) {
      if (!map.hasLayer(layer)) layer.addTo(map);
      active.push(empire);
    } else {
      if (map.hasLayer(layer)) map.removeLayer(layer);
      inactive.push(empire);
    }
  });

  // Year display
  document.getElementById('year-big').textContent = formatYear(year);
  document.getElementById('era-name').textContent = getEra(year);

  // Sidebar list
  const listEl = document.getElementById('empire-list');
  const noEl = document.getElementById('no-empires');
  listEl.innerHTML = '';

  if (active.length === 0) {
    noEl.style.display = 'block';
  } else {
    noEl.style.display = 'none';
    active.forEach(e => {
      const item = document.createElement('div');
      item.className = 'empire-item active';
      item.innerHTML = `
        <div class="empire-dot" style="background:${e.color}"></div>
        <div>
          <div class="empire-name">${e.name}</div>
          <div class="empire-dates">${formatYear(e.start)} – ${formatYear(e.end)}</div>
        </div>`;
      item.addEventListener('click', () => showInfoCard(e));
      listEl.appendChild(item);
    });
  }

  // Progress fill on slider
  const slider = document.getElementById('timeline');
  const min = parseInt(slider.min);
  const max = parseInt(slider.max);
  const pct = ((year - min) / (max - min)) * 100;
  slider.style.background = `linear-gradient(to right, #c9a84c ${pct}%, #3a3020 ${pct}%)`;
}

// ─────────────────────────────────────────────
// SLIDER
// ─────────────────────────────────────────────
const slider = document.getElementById('timeline');
slider.addEventListener('input', () => {
  update(parseInt(slider.value));
});

// ─────────────────────────────────────────────
// PLAY / STOP
// ─────────────────────────────────────────────
let playing = false;
let interval = null;

function getSpeed() {
  return parseInt(document.getElementById('speed-select').value);
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (playing) {
    stopPlay();
  } else {
    startPlay();
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  stopPlay();
  slider.value = -600;
  update(-600);
});

function startPlay() {
  playing = true;
  document.getElementById('btn-play').textContent = '◼ Stop';
  document.getElementById('btn-play').classList.add('active');
  let val = parseInt(slider.value);
  if (val >= 1947) val = -600;
  interval = setInterval(() => {
    val += 5;
    if (val > 1947) {
      stopPlay();
      return;
    }
    slider.value = val;
    update(val);
  }, getSpeed());
}

function stopPlay() {
  playing = false;
  clearInterval(interval);
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
}

// Restart at new speed if already playing
document.getElementById('speed-select').addEventListener('change', () => {
  if (playing) {
    stopPlay();
    startPlay();
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
update(-300);
</script>
